# NapCat WebSocket 配置 (敏感信息请通过环境变量设置)
# 环境变量: NAPCT_WS_URL, NAPCT_WS_BASE_URL, ONEBOT_HTTP_BASE_URL, ONEBOT_ACCESS_TOKEN
ws.url=${NAPCT_WS_URL}
ws.base.url=${NAPCT_WS_BASE_URL}
onebot.http-base-url=${ONEBOT_HTTP_BASE_URL}
onebot.access-token=${ONEBOT_ACCESS_TOKEN}

# AI 服务配置 (百炼/BaiLian) (敏感信息请通过环境变量设置)
# 环境变量: BAILIAN_API_KEY
bailian.api-key=${BAILIAN_API_KEY}
bailian.base-url=${BAILIAN_BASE_URL:https://api.meai.cloud/v1/chat/completions}
bailian.chat-model=${BAILIAN_CHAT_MODEL:claude-opus-4-7}
bailian.timeout-ms=${BAILIAN_TIMEOUT_MS:90000}
bailian.max-retries=${BAILIAN_MAX_RETRIES:2}

# Agent 服务配置 (敏感信息请通过环境变量设置)
# 环境变量: AGENT_API_KEY
agent.api-key=${AGENT_API_KEY}
agent.base-url=${AGENT_BASE_URL:https://api.meai.cloud/v1/chat/completions}
agent.model=${AGENT_MODEL:claude-opus-4-7}
agent.timeout-ms=${AGENT_TIMEOUT_MS:90000}
agent.max-retries=${AGENT_MAX_RETRIES:2}

# 兼容旧版 (敏感信息请通过环境变量设置)
# 环境变量: DASHSCOPE_API_KEY
dashscope.api-key=${DASHSCOPE_API_KEY}

# 目标群号 (敏感信息请通过环境变量设置)
# 环境变量: TARGET_GROUP_ID
target.group.id=${TARGET_GROUP_ID}

# 调试模式
debug=false

# 私聊白名单开关 true=仅白名单可私聊 false=接受所有私聊
private.whitelist.enabled=false

# 机器人 QQ 号 (敏感信息请通过环境变量设置)
# 环境变量: BOT_QQ
bot.qq=${BOT_QQ}

# 允许的群号 (敏感信息请通过环境变量设置)
# 环境变量: ALLOWED_GROUPS
allowed.groups=${ALLOWED_GROUPS}

# 预加载的群号 (敏感信息请通过环境变量设置)
# 环境变量: PRELOAD_GROUPS
preload.groups=${PRELOAD_GROUPS}

# 允许私聊的用户 (敏感信息请通过环境变量设置)
# 环境变量: ALLOWED_PRIVATE_USERS
allowed.private.users=${ALLOWED_PRIVATE_USERS}

# TTS 语音服务配置 (text-to-speech.cn)
# 环境变量: TTS_DEFAULT_VOICE, TTS_TIMEOUT_MS, TTS_MAX_RETRIES, TTS_OUTPUT_DIR
tts.default-voice=${TTS_DEFAULT_VOICE:zh-CN-XiaoshuangNeural}
tts.timeout-ms=${TTS_TIMEOUT_MS:15000}
tts.max-retries=${TTS_MAX_RETRIES:2}
tts.output-dir=${TTS_OUTPUT_DIR:/opt/qq-bot/tts/output}

# 数据库配置 (敏感信息请通过环境变量设置)
# 环境变量: DB_URL, DB_USER, DB_PASSWORD, DB_POOL_MAX_SIZE, DB_POOL_MIN_IDLE
database.url=${DB_URL}
database.user=${DB_USER}
database.password=${DB_PASSWORD}
database.pool.max-size=${DB_POOL_MAX_SIZE:10}
database.pool.min-idle=${DB_POOL_MIN_IDLE:2}
